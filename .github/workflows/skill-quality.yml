name: Skill Quality

on:
  pull_request:
  push:
    branches: [ main, master, work ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Validate skill files
        run: ./scripts/validate-skills.sh
